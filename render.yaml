services:
  - type: web
    name: devmatch-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: DATABASE_URL
        fromDatabase:
          name: devmatch-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        value: "*" # Once you have your Vercel URL, update this to your frontend URL (e.g., https://your-app.vercel.app)

databases:
  - name: devmatch-db
    databaseName: devmatch
    user: devmatch_user
